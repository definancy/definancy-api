name: "sha512_256/known_answers"

description: |
  SHA-512/256 (FIPS 180-4 §6.7) known-answer tests. Inputs are byte strings;
  outputs are 32-byte digests in lowercase hex. SHA-512/256 = SHA-512 with a
  different IV, output truncated to the first 256 bits. **NOT** the same as
  truncating SHA-512 output yourself; the IV is different per FIPS 180-4.

  The "alphabet_112" case is the NIST FIPS 180-4 §B.4 example for SHA-512/256
  and exercises the 1024-bit-block padding path (input is exactly 112 bytes
  → 1 SHA-512 block of input + 1 padding block).

  WebCrypto does not register SHA-512/256 as an algorithm — implementations
  must use a non-WebCrypto digest library (e.g. @noble/hashes in JS,
  java.security.MessageDigest with "SHA-512/256" in Java, hashlib in Python).
  See `algorithms/sha512_256.md` for the algorithm spec.

  Cross-validated by Python `hashlib.new("sha512_256")` and Node
  `crypto.createHash("sha512-256")` (note Node spells it with a dash, not a slash).

metadata:
  source: "FIPS 180-4 §B.4 (alphabet_112) + canonical lore values"
  spec:   "NIST FIPS 180-4 §6.7"

cases:
  - label: "empty"
    input:  { bytes_hex: "" }
    output: { digest_hex: "c672b8d1ef56ed28ab87c3622c5114069bdd3ad7b8f9737498d0c01ecef0967a" }

  - label: "abc"
    input:  { bytes_hex: "616263" }
    output: { digest_hex: "53048e2681941ef99b2e29b76b4c7dabe4c2d0c634fc6d46e0e2f13107e7af23" }

  - label: "alphabet_112"   # FIPS 180-4 §B.4 — multi-block test
    input:  { bytes_hex: "61626364656667686263646566676869636465666768696a6465666768696a6b65666768696a6b6c666768696a6b6c6d6768696a6b6c6d6e68696a6b6c6d6e6f696a6b6c6d6e6f706a6b6c6d6e6f70716b6c6d6e6f7071726c6d6e6f707172736d6e6f70717273746e6f707172737475" }
    output: { digest_hex: "3928e184fb8690f840da3988121d31be65cb9d3ef83ee6146feac861e19b563a" }
