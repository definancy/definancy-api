name: "id_checksum/rfc_8032_pubkeys"

description: |
  DefinancyId construction from Ed25519 public keys. Composes three
  primitives: SHA-512/256 (digest of the pubkey), last-4-byte slice
  (checksum), and base32-no-padding (final encoding).

  Algorithm (per `algorithms/id_checksum.md`):
    1. Take the 32-byte raw Ed25519 public key.
    2. Compute SHA-512/256 over those 32 bytes.
    3. Take the last 4 bytes of the digest as the checksum.
    4. Concatenate id (32) || checksum (4) = 36 bytes.
    5. Base32-encode (no padding) → exactly 58 characters.

  The pubkeys come from the RFC 8032 §7.1 test vectors so a reader can
  cross-reference with `vectors/ed25519/rfc_8032_test_vectors.yaml`.
  Intermediate values (`sha512_256_hex`, `checksum_hex`, `combined_hex`)
  are included so a failing runner can pinpoint which step diverged.

  Cross-validated by Python: hashlib SHA-512/256 + base64.b32encode with
  padding stripped.

metadata:
  source: "Composition of RFC 8032 §7.1 pubkeys + Definancy ID spec"
  spec:   "Definancy ID spec"

