name: "dpop_proof/local_provider_at_t1700000000"

description: |
  DPoP proof JWT (RFC 9449, customized) with all inputs pinned: caller
  key (RFC 8032 Test 1 seed), HTTP method, target URL, body=null,
  pinned jti, iat, exp. Output is the byte-exact signed JWT compact.

  Tests the full pipeline: derive Ed25519 keypair from seed → derive
  JWK (for the embedded `jwk` header) → mint DPoP proof with explicit
  jti/iat/exp → sign → serialize as JWT compact.

  Body is intentionally null in this vector — `bsh` claim is therefore
  absent. The body-hash path (and the documented Java
  `body.toString()` bug) lives in a separate `dpop_body_hash` vector.

  This vector requires the SDK's DPoP factory to take `iat`/`exp` as
  explicit parameters. The legacy API generated `iat` via `Instant.now()`
  / `Date.now()`. The clock-injection refactor mirrors what was done
  for `authorization_jwt`: factories stay pure; impurities live at the
  `LocalAuthProvider.authenticate` boundary.

  Cross-validated by Python `cryptography` (Ed25519) +
  `json.dumps(sort_keys=True, separators=(",",":"))` +
  `base64.urlsafe_b64encode().rstrip(b"=")`.

metadata:
  source: "Composition of RFC 8032 §7.1 Test 1 + RFC 9449 + Definancy auth spec"
  spec:   "RFC 9449 (`htu` = full request URI minus query/fragment, custom `bsh` body-hash claim instead of `ath`)"

