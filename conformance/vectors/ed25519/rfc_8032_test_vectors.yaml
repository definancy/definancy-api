name: "ed25519/rfc_8032_test_vectors"

description: |
  RFC 8032 §7.1 Ed25519 test vectors. Each case fixes a 32-byte seed
  (RFC 8032's "secret key") and an arbitrary message, and pins the
  expected raw 32-byte public key and 64-byte signature.

  Two operations a runner can verify per case:
    1. `derive_pubkey(seed) == pubkey`
    2. `sign(seed, message) == signature`
  Ed25519 signatures are deterministic per RFC 8032 §5.1.6, so both
  operations are byte-equality checks (no signature verification with
  randomness needed).

  Cross-validated by Python `cryptography` library (OpenSSL-backed) — the
  seed/pubkey/signature triples in this file match the published RFC 8032
  Test 1, Test 2, and Test 3 byte-for-byte.

metadata:
  source: "https://datatracker.ietf.org/doc/html/rfc8032#section-7.1"
  spec:   "RFC 8032"

cases:
  - label: "rfc_8032_test_1"     # empty message
    input:
      seed_hex:    "9d61b19deffd5a60ba844af492ec2cc44449c5697b326919703bac031cae7f60"
      message_hex: ""
    output:
      public_key_hex: "d75a980182b10ab7d54bfed3c964073a0ee172f3daa62325af021a68f707511a"
      signature_hex:  "e5564300c360ac729086e2cc806e828a84877f1eb8e5d974d873e065224901555fb8821590a33bacc61e39701cf9b46bd25bf5f0595bbe24655141438e7a100b"

  - label: "rfc_8032_test_2"     # 1-byte message
    input:
      seed_hex:    "4ccd089b28ff96da9db6c346ec114e0f5b8a319f35aba624da8cf6ed4fb8a6fb"
      message_hex: "72"
    output:
      public_key_hex: "3d4017c3e843895a92b70aa74d1b7ebc9c982ccf2ec4968cc0cd55f12af4660c"
      signature_hex:  "92a009a9f0d4cab8720e820b5f642540a2b27b5416503f8fb3762223ebdb69da085ac1e43e15996e458f3613d0f11d8c387b2eaeb4302aeeb00d291612bb0c00"

  - label: "rfc_8032_test_3"     # 2-byte message
    input:
      seed_hex:    "c5aa8df43f9f837bedb7442f31dcb7b166d38535076f094b85ce3a2e0b4458f7"
      message_hex: "af82"
    output:
      public_key_hex: "fc51cd8e6218a1a38da47ed00230f0580816ed13ba3303ac5deb911548908025"
      signature_hex:  "6291d657deec24024827e69c3abe01a30ce548a284743a445e3680d7db5ac3ac18ff9b538d16f290ae67f760984dc6594a7c15e9716ed28dc027beceea1ec40a"
