name: "dpop_body_hash/local_provider_with_body"

description: |
  DPoP proof JWT with a non-null body — exercises the `bsh` claim
  pipeline (SHA-512/256 of body bytes → base64url-no-padding). Body
  bytes are pinned as raw hex so both languages MUST hash the same
  bytes; any deviation surfaces as a mismatching `bsh` claim and a
  mismatching signature.

  This is the vector that catches the documented Java
  `LocalAuthProvider.java:49` `body.toString()` bug: when the JAX-RS
  entity is a typed POJO without a custom `toString()`, the legacy
  Java DPoP path hashes the JVM identity string `Class@hex` instead of
  the wire JSON. Fixing that bug requires pushing serialization up
  to the call boundary AND changing the DPoP API to accept `byte[]`
  (the actual wire bytes) instead of `String`.

  Body bytes for this case: UTF-8 of `{"hello":"world"}` (17 bytes).

  Cross-validated by Python `cryptography` (Ed25519) +
  `hashlib.new("sha512_256", body)` +
  `base64.urlsafe_b64encode().rstrip(b"=")`.

metadata:
  source: "Composition of RFC 8032 §7.1 Test 1 + Definancy auth spec (custom `bsh` claim)"
  spec:   "Definancy auth spec (`bsh = base64url(SHA-512/256(body))`)"

